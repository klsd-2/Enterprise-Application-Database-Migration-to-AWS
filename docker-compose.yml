version: "3.8"

services:
  app:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: enterprise
      DB_USER: admin
      DB_PASSWORD: password
    depends_on:
      - db

  db:
    image: postgres
    environment:
      POSTGRES_DB: enterprise
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
